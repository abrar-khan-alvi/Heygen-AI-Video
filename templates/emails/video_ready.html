<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Your AI Video is Ready! 🎬</h2>
        <p>Hello {{ user.username }},</p>
        <p>Great news! Your video project <strong>"{{ project_title }}"</strong> has finished rendering.</p>

        <p>You can watch and download it here:</p>
        <p style="text-align: center;">
            <a href="{{ video_url }}" class="btn">Watch Video</a>
        </p>

        <p>If the button doesn't work, copy this link:</p>
        <p>{{ video_url }}</p>

        <div class="footer">
            <p>Thanks for using our AI Video Generator!</p>
        </div>
    </div>
</body>

</html>
