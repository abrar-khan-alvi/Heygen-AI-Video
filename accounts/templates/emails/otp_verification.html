<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body
    style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 40px 20px;">
        <tr>
            <td align="center">
                <table width="100%" cellpadding="0" cellspacing="0"
                    style="max-width: 480px; background-color: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

                    <!-- Header -->
                    <tr>
                        <td
                            style="padding: 40px 40px 30px; text-align: center; background-color: #111111; border-radius: 8px 8px 0 0;">
                            <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 500;">Verify Your Email
                            </h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding: 40px;">
                            <p style="margin: 0 0 24px; color: #333333; font-size: 15px; line-height: 1.6;">
                                Hi <strong>{{ username }}</strong>,
                            </p>
                            <p style="margin: 0 0 32px; color: #666666; font-size: 15px; line-height: 1.6;">
                                Use this code to verify your email:
                            </p>

                            <!-- OTP Code -->
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center" style="padding: 24px 0;">
                                        <div
                                            style="font-size: 32px; font-weight: 600; letter-spacing: 8px; color: #111111; font-family: 'Courier New', monospace; background-color: #f5f5f5; padding: 20px 32px; border-radius: 8px; display: inline-block;">
                                            {{ otp_code }}</div>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin: 32px 0 0; color: #999999; font-size: 13px; text-align: center;">
                                Expires in {{ expiry_minutes }} minutes
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 24px 40px; border-top: 1px solid #eeeeee; text-align: center;">
                            <p style="margin: 0; color: #999999; font-size: 12px;">
                                Didn't request this? Ignore this email.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
