services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - db_data:/app/db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,web
      - CELERY_BROKER_URL=redis://backend-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://backend-redis:6379/1
      - DB_DIR=/app/db
    depends_on:
      - backend-redis
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  worker:
    build: .
    command: celery -A core worker -l info
    volumes:
      - .:/app
      - db_data:/app/db
    env_file:
      - .env
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - CELERY_BROKER_URL=redis://backend-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://backend-redis:6379/1
      - DB_DIR=/app/db
    depends_on:
      - backend-redis
      - web
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  beat:
    build: .
    command: celery -A core beat -l info
    volumes:
      - .:/app
      - db_data:/app/db
    env_file:
      - .env
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key
      - CELERY_BROKER_URL=redis://backend-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://backend-redis:6379/1
      - DB_DIR=/app/db
    depends_on:
      - backend-redis
      - web
      - worker
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

  backend-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network
    dns:
      - 8.8.8.8
      - 1.1.1.1

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
